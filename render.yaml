services:
  - type: web
    name: thescope-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npm run build
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemma-3-27b-it
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 22
